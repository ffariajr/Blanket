# WebSocket proxy snippet for church.dogmanjr.net -- adds real-time
# collaboration support for Blanket, proxying /blanket/ws/* to the
# blanket-ws systemd service on 127.0.0.1:8765.
#
# --- One-time module setup (run first, as root/sudo) ---
#   sudo a2enmod proxy_wstunnel
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# (proxy, proxy_http, rewrite, ssl are already enabled on this box;
# proxy_wstunnel is installed but was not enabled as of this writing.)
#
# --- Where this snippet goes ---
# Insert the two lines below into BOTH vhost files, inside the
# <VirtualHost> block, after the existing <Directory /var/www/church>
# block (order relative to ErrorLog/CustomLog doesn't matter):
#
#   /etc/apache2/sites-available/050-church.conf         (port 80 vhost)
#   /etc/apache2/sites-available/050-church-le-ssl.conf   (port 443 vhost)
#
# The plain :80 vhost redirects everything to https before this would ever
# apply (see its existing RewriteRule), so it's effectively only load-
# bearing in the -le-ssl.conf vhost -- included in both anyway for
# consistency / in case that redirect is ever changed.
#
# ProxyPass at the vhost level is evaluated before per-directory .htaccess
# rewriting, so /blanket/ws/* requests are proxied directly and never reach
# index.php's front-controller rewrite. If that assumption turns out wrong
# on this Apache version/config, the fallback is the classic
# RewriteCond-on-Upgrade-header form instead of a bare ProxyPass ws://
# (search "apache websocket proxy RewriteCond Upgrade" if needed).

ProxyPreserveHost On
ProxyPass /blanket/ws/ ws://127.0.0.1:8765/ws/
ProxyPassReverse /blanket/ws/ ws://127.0.0.1:8765/ws/

# --- After editing both files ---
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
